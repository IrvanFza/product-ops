<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>{{PRODUCT_NAME}} — Brand Guide</title>
<style>
  :root { --ink:#111; --muted:#666; --accent:{{ACCENT|#2E5BFF}}; --bg:#fff; }
  * { box-sizing: border-box; }
  body { font-family: 'Space Grotesk', 'DM Sans', system-ui, sans-serif; color: var(--ink); margin:0; padding:40px; line-height:1.5; }
  h1 { font-size: 40px; margin: 0 0 4px; }
  h2 { font-size: 20px; margin: 32px 0 8px; border-bottom: 2px solid var(--accent); padding-bottom: 4px; }
  .sub { color: var(--muted); margin-bottom: 32px; }
  .swatches { display:flex; gap:12px; margin: 12px 0; }
  .swatch { width:64px; height:64px; border-radius:8px; border:1px solid #eee; }
  .voice dl { display:grid; grid-template-columns: 120px 1fr; gap: 6px 16px; margin:8px 0; }
  .voice dt { font-weight:600; color:var(--muted); }
  .ex { background:#f7f7f8; padding:12px 16px; border-radius:8px; margin:8px 0; }
  .footer { margin-top:48px; color:var(--muted); font-size:12px; border-top:1px solid #eee; padding-top:12px; }
</style>
</head>
<body>
  <h1>{{PRODUCT_NAME}}</h1>
  <div class="sub">Brand Guide · generated by product-ops · {{DATE}}</div>

  <h2>Positioning</h2>
  <p>{{POSITIONING}}</p>

  <h2>Palette</h2>
  <div class="swatches">
    <div class="swatch" style="background:{{ACCENT|#2E5BFF}}" title="accent"></div>
    <div class="swatch" style="background:{{INK|#111111}}" title="ink"></div>
    <div class="swatch" style="background:{{MUTED|#666666}}" title="muted"></div>
    <div class="swatch" style="background:{{BG|#FFFFFF}}" title="bg"></div>
  </div>

  <h2>Voice</h2>
  <div class="voice">
    <dl>
      <dt>Do</dt><dd>{{VOICE_DO}}</dd>
      <dt>Don't</dt><dd>{{VOICE_DONT}}</dd>
    </dl>
    <div class="ex">{{VOICE_EXAMPLE}}</div>
  </div>

  <h2>Naming notes</h2>
  <p>{{NAMING_NOTES}}</p>

  <div class="footer">product-ops brand-guide · {{PRODUCT_SLUG}} · report {{REPORT_NUM}}</div>
</body>
</html>
