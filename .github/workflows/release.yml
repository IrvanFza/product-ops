name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v5
        with:
          config-file: .github/release-please-config.json
          manifest-file: .release-please-manifest.json
      # npm publish of the scaffolder/ package can be added here once an
      # NPM_TOKEN secret is configured (gated on release_created output).
